<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MBTI SAJU Concept 3</title>
  <desc id="desc">Minimal editorial mark with central five-elements wheel and geometric MBTI anchors.</desc>

  <defs>
