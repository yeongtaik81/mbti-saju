<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="markTitle markDesc">
  <title id="markTitle">MBTI SAJU Square Mark</title>
  <desc id="markDesc">Monochrome MBTI square blocks with an enlarged central five-elements wheel.</desc>

  <defs>
    <filter id="shadow" x="30" y="30" width="452" height="452" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="88" fill="#F8FAFC"/>

  <g filter="url(#shadow)">
    <rect x="56" y="56" width="196" height="196" rx="28" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="260" y="56" width="196" height="196" rx="28" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="56" y="260" width="196" height="196" rx="28" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="260" y="260" width="196" height="196" rx="28" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
  </g>

  <path d="M256 256L256 96A160 160 0 0 1 408 207Z" fill="#D9AF3A"/>
  <path d="M256 256L408 207A160 160 0 0 1 350 385Z" fill="#5FC95A"/>
